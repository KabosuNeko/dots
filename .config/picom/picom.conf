# -------------------------
# Minimal Smooth Picom (Merged)
# -------------------------

backend = "glx";          # GPU acceleration
vsync = true;              # Prevent tearing

# -------------------------
# Shadows
# -------------------------
shadow = true;
shadow-radius = 0;        # smaller, faster shadow
shadow-opacity = 0.3;      # light shadow
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-exclude = [ "class_g = 'flameshot'" ];


# -------------------------
# Transitions / Animations
# -------------------------
transition-length = 100;   # Giảm từ 150 xuống 100 cho nhanh hơn
transition-pow-x = 0.4;
transition-pow-y = 0.4;
transition-pow-w = 0.4;
transition-pow-h = 0.4;
size-transition = true;

animations = (
  # Di chuyển và thay đổi kích thước cửa sổ (Geometry)
  {
    triggers = ["geometry"]
    scale-x = {
      curve = "cubic-bezier(0, 0, 0.2, 1)"; # Ease-out chuẩn, không nảy
      duration = 0.12;                     # Siêu nhanh (120ms)
      start = "window-width-before / window-width";
      end = 1;
    },
    scale-y = {
      curve = "cubic-bezier(0, 0, 0.2, 1)";
      duration = 0.12;
      start = "window-height-before / window-height";
      end = 1;
    },
    offset-x = {
      curve = "cubic-bezier(0, 0, 0.2, 1)";
      duration = 0.12;
      start = "window-x-before - window-x";
      end = 0;
    },
    offset-y = {
      curve = "cubic-bezier(0, 0, 0.2, 1)";
      duration = 0.12;
      start = "window-y-before - window-y";
      end = 0;
    },

    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },

  # Hiệu ứng khi mở cửa sổ (Open)
  {
    triggers = ["open"];
    opacity = { curve = "linear"; duration = 0.1; start = 0; end = "window-raw-opacity"; };
    scale-x = { curve = "cubic-bezier(0, 0, 0.2, 1)"; duration = 0.12; start = 0.95; end = 1; }; # Chỉ zoom nhẹ từ 95%
    scale-y = "scale-x";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
  },

  # Hiệu ứng khi đóng cửa sổ (Close)
  {
    triggers = ["close"];
    opacity = { curve = "linear"; duration = 0.1; start = "window-raw-opacity-before"; end = 0; };
    scale-x = { curve = "cubic-bezier(0, 0, 0.2, 1)"; duration = 0.1; start = 1; end = 0.95; };
    scale-y = "scale-x";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
  }
);

# -------------------------
# Blur (optional, lightweight)
# -------------------------
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur: {
  method = "dual_kawase";
  deviation = 1.0;
  strength = 5;
  }
blur-background-exclude = [ "class_g = 'flameshot'" ];

# -------------------------
# Opacity
# -------------------------
inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
corner-radius = 0;

# -------------------------
# Misc
# -------------------------
detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-transient = true;

opacity-rule = [
  "85:class_g = 'vesktop'",
  "85:class_g = 'TelegramDesktop'",
  "85:class_g = 'Code'",
  "85:class_g = 'Antigravity'",
  "85:class_g = 'Thunar'"
];